<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-neutral-900 to-black text-lime-300 min-h-screen">

<nav class="bg-black/90 backdrop-blur-lg shadow-lg border-b border-lime-400 mb-12">
    <div class="container mx-auto px-6 py-5 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-lime-400 tracking-wide">
            Product Detail
        </h1>
        <a href="/products"
           class="text-lime-300 hover:text-red-500 font-medium transition duration-300">
            Back
        </a>
    </div>
</nav>

<div class="container mx-auto px-6 py-20">
    <div class="max-w-2xl mx-auto bg-black
                p-12 rounded-3xl shadow-2xl
                border-l-8 border-red-600">

        <h1 class="text-4xl font-extrabold text-lime-400 mb-8"
            th:text="${product.name}">
        </h1>

        <p class="mb-4 text-neutral-400 text-lg">
            Category:
            <span class="text-lime-300 font-semibold ml-2"
                  th:text="${product.category}"></span>
        </p>

        <p class="text-4xl font-bold text-red-500 mb-10"
           th:text="${product.price}">
        </p>

        <p class="mb-10 text-lg">
            <span class="text-neutral-400">Stock:</span>
            <span class="font-bold text-lime-400 text-2xl ml-2"
                  th:text="${product.stock}">
            </span>
        </p>

        <a href="/products"
           class="bg-lime-400 hover:bg-red-600
                  text-black font-bold
                  px-8 py-3 rounded-xl shadow-lg
                  hover:scale-105 transform transition duration-300">
            Back to List
        </a>

    </div>
</div>

</body>
</html>
