<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-neutral-900 to-black text-lime-300 min-h-screen">

<nav class="bg-black/90 backdrop-blur-lg shadow-lg border-b border-lime-400 mb-12">
    <div class="container mx-auto px-6 py-5 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-lime-400 tracking-wide">
            Products
        </h1>
        <a href="/" class="text-lime-300 hover:text-red-500 font-medium transition duration-300">
            Home
        </a>
    </div>
</nav>

<div class="container mx-auto px-6 pb-20 space-y-8">

    <div th:each="product : ${products}"
         class="bg-black rounded-3xl shadow-2xl p-8
                border border-lime-400/30
                hover:shadow-[0_20px_60px_rgba(0,255,0,0.2)]
                hover:scale-[1.02] transform transition duration-300">

        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6">

            <!-- LEFT CONTENT -->
            <div>
                <h3 class="text-2xl font-bold text-lime-400 mb-2"
                    th:text="${product.name}">
                </h3>

                <span class="inline-block bg-lime-400 text-black
                             text-sm px-4 py-1 rounded-full font-semibold">
                    <span th:text="${product.category}"></span>
                </span>

                <p class="text-3xl font-extrabold text-red-500 mt-4"
                   th:text="${product.price}">
                </p>
            </div>

            <!-- RIGHT BUTTON -->
            <div>
                <a th:href="@{/products/{id}(id=${product.id})}"
                   class="inline-block bg-lime-400
                          hover:bg-red-600
                          text-black font-bold px-8 py-3
                          rounded-xl shadow-lg
                          hover:scale-105 transform transition duration-300">
                    View Detail →
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
