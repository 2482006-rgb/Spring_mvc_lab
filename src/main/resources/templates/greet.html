<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Greeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-black via-neutral-900 to-black text-lime-300 min-h-screen">

<!-- NAVIGATION -->
<nav class="bg-black/90 backdrop-blur-lg shadow-lg border-b border-lime-400 mb-16">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-lime-400 tracking-wide">
            Greeting
        </h1>
        <a th:href="@{/}"
           class="text-lime-300 hover:text-red-500 font-medium transition duration-300">
            Home
        </a>
    </div>
</nav>

<div class="max-w-3xl mx-auto mt-20 px-6 text-center">

    <div class="bg-black rounded-3xl shadow-2xl p-12 border-l-8 border-red-600">

        <h1 th:text="${greeting}"
            class="text-4xl md:text-5xl font-extrabold text-lime-400">
            Greeting
        </h1>

        <a th:href="@{/}"
           class="inline-block mt-10 bg-lime-400 hover:bg-red-600
                  text-black font-bold px-8 py-3 rounded-xl
                  shadow-lg hover:scale-105 transform transition duration-300">
            Home
        </a>

    </div>

</div>

</body>
</html>
