<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>About</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">
    <h1 th:text="${appName}"></h1>
    <p>Version: <span th:text="${version}"></span></p>
    <p>Author: <span th:text="${author}"></span></p>

    <h3>Technologies:</h3>
    <ul>
        <li th:each="tech : ${technologies}"
            th:text="${tech}"></li>
    </ul>

    <a th:href="@{/}" class="btn btn-secondary mt-3">Home</a>
    <a th:href="@{/about}" class="nav-link">About</a>
</div>

</body>
</html>
