<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>About</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-black via-neutral-900 to-black text-lime-300 min-h-screen">

<!-- NAVIGATION -->
<nav class="bg-black/90 backdrop-blur-lg shadow-lg border-b border-lime-400 mb-12">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-lime-400 tracking-wide">
            About
        </h1>
        <a th:href="@{/}"
           class="text-lime-300 hover:text-red-500 font-medium transition duration-300">
            Home
        </a>
    </div>
</nav>

<div class="max-w-4xl mx-auto mt-10 px-6">

    <div class="bg-black rounded-3xl shadow-2xl p-10 border-l-8 border-red-600">

        <h1 class="text-4xl font-extrabold text-lime-400"
            th:text="${appName}">App Name</h1>

        <p class="mt-6 text-lg text-neutral-400">
            <strong class="text-neutral-500">Version:</strong>
            <span class="text-lime-300 font-semibold"
                  th:text="${version}"></span>
        </p>

        <p class="mt-2 text-lg text-neutral-400">
            <strong class="text-neutral-500">Author:</strong>
            <span class="text-lime-300 font-semibold"
                  th:text="${author}"></span>
        </p>

        <h3 class="mt-8 text-2xl font-bold text-lime-400">
            Technologies Used:
        </h3>

        <ul class="mt-4 space-y-3">
            <li class="bg-lime-400 text-black px-5 py-3 rounded-xl font-semibold shadow-sm"
                th:each="tech : ${technologies}"
                th:text="${tech}">
                Technology
            </li>
        </ul>

        <a th:href="@{/}"
           class="inline-block mt-10 bg-lime-400 hover:bg-red-600
                  text-black font-bold px-8 py-3 rounded-xl
                  shadow-lg hover:scale-105 transform transition duration-300">
            Home
        </a>

    </div>

</div>

</body>
</html>
