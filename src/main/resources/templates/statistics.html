<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Statistik</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-black via-neutral-900 to-black text-lime-300 min-h-screen">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="max-w-5xl mx-auto mt-16 px-6">

    <div class="bg-black rounded-3xl shadow-2xl p-12 border-l-8 border-red-600">

        <h2 class="text-4xl font-extrabold text-lime-400">Statistik Produk</h2>
        <hr class="my-6 border-neutral-700">

        <p class="mt-4 text-lg text-neutral-400">
            <strong class="text-neutral-500">Total Produk:</strong>
            <span class="text-lime-400 font-bold"
                  th:text="${totalProducts}"></span>
        </p>

        <h5 class="mt-8 text-2xl font-bold text-lime-400">
            Total Per Kategori:
        </h5>

        <ul class="mt-4 space-y-3">
            <li class="bg-lime-400 text-black px-6 py-3 rounded-xl font-semibold shadow-sm"
                th:each="entry : ${totalPerCategory}">
                <span th:text="${entry.key}"></span> :
                <span th:text="${entry.value}"></span>
            </li>
        </ul>

        <div class="mt-10 space-y-3 text-lg text-neutral-400">

            <p>
                <strong class="text-neutral-500">Produk Termahal:</strong>
                <span class="text-lime-300 font-semibold"
                      th:text="${mostExpensive.name}"></span>
                (Rp <span class="font-bold text-red-500"
                          th:text="${mostExpensive.price}"></span>)
            </p>

            <p>
                <strong class="text-neutral-500">Produk Termurah:</strong>
                <span class="text-lime-300 font-semibold"
                      th:text="${cheapest.name}"></span>
                (Rp <span class="font-bold text-red-500"
                          th:text="${cheapest.price}"></span>)
            </p>

            <p>
                <strong class="text-neutral-500">Rata-rata Harga:</strong>
                Rp <span class="font-bold text-lime-400"
                         th:text="${averagePrice}"></span>
            </p>

            <p>
                <strong class="text-neutral-500">Jumlah Produk Stok &lt; 20:</strong>
                <span class="font-bold text-lime-400"
                      th:text="${lowStockCount}"></span>
            </p>

        </div>

    </div>

</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
