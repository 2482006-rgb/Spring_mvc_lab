<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Statistik Produk</title>
</head>
<body>

<h1>Statistik Produk</h1>

<p>Total Produk: <span th:text="${totalProducts}"></span></p>

<h3>Total per Kategori:</h3>
<ul>
    <li th:each="entry : ${categorySummary}">
        <span th:text="${entry.key}"></span> :
        <span th:text="${entry.value}"></span>
    </li>
</ul>

<h3>Produk Termahal:</h3>
<p>
    <span th:text="${mostExpensive.name}"></span> -
    Rp <span th:text="${mostExpensive.price}"></span>
</p>

<h3>Produk Termurah:</h3>
<p>
    <span th:text="${cheapest.name}"></span> -
    Rp <span th:text="${cheapest.price}"></span>
</p>

<p>Rata-rata Harga:
    Rp <span th:text="${averagePrice}"></span>
</p>

<p>Jumlah Produk Stok < 20:
    <span th:text="${lowStockCount}"></span>
</p>

</body>
</html>
